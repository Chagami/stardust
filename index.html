<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stardust: Planetary Creator</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        
        /* UI Elements */
        #start-btn { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px 40px; background: none; border: 2px solid #00ffff;
            color: #00ffff; cursor: pointer; z-index: 1000; font-size: 1.2rem;
            transition: all 0.3s;
        }
        #start-btn:hover { background: #00ffff; color: #000; box-shadow: 0 0 20px #00ffff; }

        #container { width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; }
        video { display: none; }

        /* HUD Analyzers */
        .hud {
            position: absolute; top: 50%; transform: translateY(-50%);
            color: #00ffff; z-index: 100; padding: 30px; 
            pointer-events: none; display: none;
            background: rgba(0,0,0,0.4); border-radius: 10px;
        }
        #hud-left { left: 40px; border-left: 3px solid #00ffff; }
        #hud-right { right: 40px; border-right: 3px solid #00ffff; text-align: right; }
        
        .stat { margin: 25px 0; font-size: 1.1rem; letter-spacing: 2px; }
        .stat span { font-weight: bold; font-size: 1.6rem; display: block; margin-top: 5px; }
        
        #instruction {
            position: absolute; bottom: 30px; width: 100%; text-align: center;
            color: #00ffff; opacity: 0.6; font-size: 0.9rem; pointer-events: none;
        }
    </style>
</head>
<body>

    <button id="start-btn">INITIALIZE BIOMETRIC SCAN</button>

    <div id="hud-left" class="hud">
        <div class="stat">OXYGEN (O2) <span id="o2-val">0.0</span></div>
        <div class="stat">CARBON (C) <span id="c-val">0.0</span></div>
    </div>

    <div id="hud-right" class="hud">
        <div class="stat">HYDROGEN (H) <span id="h-val">0.0</span></div>
        <div class="stat">NITROGEN (N) <span id="n-val">0.0</span></div>
    </div>

    <div id="instruction">PRESS [ SPACE ] TO COALESCE PLANETARY MASS</div>

    <div id="container"></div>
    <video id="vid" playsinline></video>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>

    <script>
        const video = document.getElementById('vid');
        const startBtn = document.getElementById('start-btn');
        const container = document.getElementById('container');
        const hudElements = document.querySelectorAll('.hud');

        // --- 1. THREE.JS SCENE SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);
        camera.position.z = 6;

        // --- 2. THE MOLECULAR PARTICLE SYSTEM ---
        const particleCount = 18000;
        const geo = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const basePos = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);

        let isShattered = false;

        for (let i = 0; i < particleCount; i++) {
            const x = (Math.random() - 0.5) * 15;
            const y = (Math.random() - 0.5) * 11;
            const z = (Math.random() - 0.5) * 2;
            positions.set([x, y, z], i * 3);
            basePos.set([x, y, z], i * 3);

            // Set colors based on elemental probability
            const p = Math.random();
            if (p > 0.85) colors.set([1, 1, 1], i * 3);         // Trace Elements (White)
            else if (p > 0.4) colors.set([0, 0.9, 1], i * 3);    // Oxygen (Cyan)
            else colors.set([0.6, 0.2, 1], i * 3);              // Carbon/Nitrogen (Purple)
        }

        geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const mat = new THREE.PointsMaterial({
            size: 0.035,
            vertexColors: true,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const atoms = new THREE.Points(geo, mat);
        scene.add(atoms);

        // --- 3. ATMOSPHERIC GLOW (PLANET RIM) ---
        const glowGeo = new THREE.SphereGeometry(2.7, 32, 32);
        const glowMat = new THREE.MeshBasicMaterial({
            color: 0x00ffff,
            transparent: true,
            opacity: 0,
            side: THREE.BackSide
        });
        const atmosphere = new THREE.Mesh(glowGeo, glowMat);
        scene.add(atmosphere);

        // --- 4. PLANET BUILDER LOGIC ---
        function buildPlanet() {
            if(isShattered) return;
            isShattered = true;

            // Reveal HUD
            hudElements.forEach(el => el.style.display = 'block');
            gsap.from(".stat", { x: (i, t) => t.parentElement.id === 'hud-left' ? -100 : 100, opacity: 0, stagger: 0.1 });
            gsap.to(glowMat, { opacity: 0.2, duration: 4 });

            // Animate Numbers
            const animateNum = (id, target) => {
                let obj = { val: 0 };
                gsap.to(obj, { val: target, duration: 5, onUpdate: () => {
                    document.getElementById(id).innerText = obj.val.toFixed(1) + "%";
                }});
            };
            animateNum('o2-val', 65.0);
            animateNum('c-val', 18.5);
            animateNum('h-val', 10.1);
            animateNum('n-val', 3.2);

            // Morph Particles to Sphere
            for (let i = 0; i < particleCount; i++) {
                const phi = Math.acos(-1 + (2 * i) / particleCount);
                const theta = Math.sqrt(particleCount * Math.PI) * phi;
                const r = 2.4 + Math.random() * 0.4;

                gsap.to(geo.attributes.position.array, {
                    duration: 3 + Math.random() * 2,
                    [i * 3]: r * Math.cos(theta) * Math.sin(phi),
                    [i * 3 + 1]: r * Math.sin(theta) * Math.sin(phi),
                    [i * 3 + 2]: r * Math.cos(phi),
                    ease: "expo.inOut",
                    onUpdate: () => geo.attributes.position.needsUpdate = true
                });
            }
        }

        // --- 5. MEDIAPIPE AI TRACKING ---
        const offCanvas = document.createElement('canvas');
        offCanvas.width = 128; offCanvas.height = 128;
        const offCtx = offCanvas.getContext('2d', { willReadFrequently: true });

        const selfieSegmentation = new SelfieSegmentation({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}`,
        });
        selfieSegmentation.setOptions({ modelSelection: 1 });

        selfieSegmentation.onResults((results) => {
            if (!results.segmentationMask || isShattered) return;

            offCtx.save();
            offCtx.clearRect(0, 0, 128, 128);
            offCtx.translate(128, 0);
            offCtx.scale(-1, 1);
            offCtx.drawImage(results.segmentationMask, 0, 0, 128, 128);
            offCtx.restore();

            const mask = offCtx.getImageData(0, 0, 128, 128).data;
            const currentPos = geo.attributes.position.array;

            for (let i = 0; i < particleCount; i++) {
                const u = (basePos[i * 3] / 15) + 0.5;
                const v = 0.5 - (basePos[i * 3 + 1] / 11);
                const mx = Math.floor(u * 128);
                const my = Math.floor(v * 128);

                if (mx >= 0 && mx < 128 && my >= 0 && my < 128) {
                    const idx = (my * 128 + mx) * 4;
                    // Reactive Z-Depth based on body presence
                    const targetZ = mask[idx] > 100 ? 1.8 : -1.5;
                    currentPos[i * 3 + 2] += (targetZ - currentPos[i * 3 + 2]) * 0.1;
                }
            }
            geo.attributes.position.needsUpdate = true;
        });

        // --- 6. RENDER LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            if (isShattered) {
                atoms.rotation.y += 0.003;
                atmosphere.rotation.y += 0.003;
            } else {
                atoms.rotation.z += 0.0003;
            }
            renderer.render(scene, camera);
        }

        // --- 7. INITIALIZATION ---
        startBtn.addEventListener('click', () => {
            startBtn.style.display = 'none';
            const cameraHelper = new Camera(video, {
                onFrame: async () => { await selfieSegmentation.send({ image: video }); },
                width: 640, height: 480
            });
            cameraHelper.start();
            animate();
        });

        window.addEventListener('keydown', (e) => { if (e.code === "Space") buildPlanet(); });
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
